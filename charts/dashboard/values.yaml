  enabled: true
  


# Custom Cache Valkey
valkey:
  enabled: true
  auth:
    enabled: false
# Apache Superset Chart configuration
superset:
  enabled: true
  redis:
    enabled: false
  postgresql:
    enabled: false
  ingress:
    enabled: true
    ingressClassName: ~
    annotations:
      # kubernetes.io/tls-acme: "true"
      ## Extend timeout to allow long running queries.
      # nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
      # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      # nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
      cert-manager.io/cluster-issuer: le-staging
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    path: /
    pathType: ImplementationSpecific
    hosts:
      - superset.default.svc.cluster.local

  init:
    loadExamples: false

  extraSecretEnv:
    SUPERSET_SECRET_KEY: thisISaSECRET_1234

  configOverrides:
    sql_connect: |
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://{{ .Values.credentials.superset.db_username }}:{{ .Values.credentials.superset.db_password }}@{{ include "dashboard.fullname" . }}-stackgres-simple:5432/{{ .Values.credentials.superset.db_name }}"
    secret: |
      from superset.constants import CHANGE_ME_SECRET_KEY
      print(f"Setting up secret key for Superset Admin")
      SECRET_KEY= os.getenv("SECRET_KEY") or os.getenv("SUPERSET_SECRET_KEY") or CHANGE_ME_SECRET_KEY
      if SECRET_KEY is None or SECRET_KEY == 'CHANGE_ME_TO_A_COMPLEX_RANDOM_SECRET' or SECRET_KEY =='thisISaSECRET_1234':
        import secrets
        import base64
        random_bytes = secrets.token_bytes(42)
        # SECRET_KEY = base64.b64encode(random_bytes).decode('utf-8')
        print(f"Set the Secret successfully.")
        os.environ["SECRET_KEY"] = SECRET_KEY
        os.environ["SUPERSET_SECRET_KEY"] = SECRET_KEY
      else:
        os.environ["SUPERSET_SECRET_KEY"] = SECRET_KEY
      FEATURE_FLAGS: {
        "ENABLE_TEMPLATE_PROCESSING": True,
        "ALERT_REPORTS": True,
        "ENABLE_ADVANCED_DATA_TYPES": True,
        "DASHBOARD_NATIVE_FILTERS": True,
        "ENABLE_SUPERSET_META_DB": True,
        "DYNAMIC_PLUGINS": True
      }
      ENABLE_PROXY_FIX = True
      ALERT_REPORTS_NOTIFICATION_DRY_RUN = True
      APP_NAME = "Bombeke Beyond Data Platform"
      CACHE_CONFIG = {
          'CACHE_TYPE': 'redis',
          'CACHE_DEFAULT_TIMEOUT': 300,  # 5 minutes
          'CACHE_KEY_PREFIX': 'superset_',
          'CACHE_REDIS_URL': 'redis://localhost:6379/0'
      }

      SQLLAB_QUERY_CACHE_TIMEOUT = 300  # Query cache timeout
      CACHE_DEFAULT_TIMEOUT = 300  
     
  supersetNode:
    connections:
      # Redis must be set redis.enabled:false
      redis_host: "smartai-valkey.smartai.svc.cluster.local"
      redis_port: "6379"
      redis_user: ""
      # redis_password: superset
      redis_cache_db: "1"
      redis_celery_db: "0"
      # Or SSL port is usually 6380
      # Update following for using Redis with SSL
      redis_ssl:
        enabled: false
        ssl_cert_reqs: CERT_NONE
      # PostgreSQL must be set postgresql.enabled:false
      # -- Database type for Superset metadata (Supported types: "postgresql", "mysql")
      db_type: "postgresql"
      db_host: "smartai-stackgres-simple.smartai.svc.cluster.local"
      db_port: "5432"
      db_user: superset
      db_pass: superset
      db_name: superset
  #configOverrides:
  #  DATABASE_DIALECT: "postgresql"
  #  DATABASE_USER: "<existing-db-username>"
  #  DATABASE_PASSWORD: "<existing-db-password>"
  #  DATABASE_HOST: "<existing-db-host>"
  #  DATABASE_PORT: "<existing-db-port>"
  #  DATABASE_DB: "<existing-db-name>"

  #extraEnv:
  #  - name: SUPERSET_DATABASE_URI
  #    value: "postgresql+psycopg2://<existing-db-username>:<existing-db-password>@<existing-db-host>:<existing-db-port>/<existing-db-name>"

  bootstrapScript: |
    #!/bin/bash

    echo "Installing extra drivers"
    apt-get update && apt-get install -y pkg-config default-libmysqlclient-dev build-essential

    uv pip install .[postgres] \
      psycopg2-binary \
      Pillow \
      polars \
      shapely \
      duckdb \
      duckdb-engine \
      "shillelagh[genericjsonapi]" \
      sqlalchemy-solr \
      starrocks \
      singlestoredb \
      "clickhouse-connect>=0.13.0" \
      pymongosql && \
    if [ ! -f ~/bootstrap ]; then echo "Running Superset with uid {{ .Values.runAsUser }}" > ~/bootstrap; fi

trino:
  enabled: false
  server:
    workers: 1
  catalogs:
    mongodb: |
      connector.name=mongodb
      mongodb.connection-url=mongodb://user:pass@sample.host:27017/

kube-starrocks:
  enabled: false
  operator:
    starrocksOperator:
      enabled: true
      resources:
        limits:
          cpu: 100m # 500m
          memory: 200Mi # 800Mi
        requests:
          cpu: 100m # 500m
          memory: 400Mi # 400Mi

  starrocks:
    enabled: true
    starrocksCluster:
      enabledFe: true
      enabledCn: false
    initPassword:
      enabled: true
      # Set a password secret, for example:
      # kubectl create secret generic starrocks-root-pass --from-literal=password='g()()dpa$$word'
      passwordSecret: starrocks-root-pass

    starrocksFESpec:
      replicas: 3
      resources:
        requests:
          cpu: 1
          memory: 1Gi
      storageSpec:
        name: fe

    starrocksBeSpec:
      replicas: 3
      resources:
        requests:
          cpu: 1
          memory: 2Gi
      storageSpec:
        name: be
        storageSize: 15Gi
    starrocksCnSpec:
      resources:
        requests:
          cpu: 1
          memory: 2Gi
    starrocksFeProxySpec:
      enabled: true