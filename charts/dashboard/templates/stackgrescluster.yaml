{{- if .Values.stackgresOperator.enabled }}
apiVersion: stackgres.io/v1
kind: SGCluster
metadata:
  name: {{ include "dashboard.fullname" . }}-stackgres-simple
  labels:
    {{- include "dashboard.labels" $ | nindent 4 }}
spec:
  instances: 1
  {{- if .Values.profile }}
  profile: {{ .Values.profile }}
  {{- end }}
  sgInstanceProfile: {{ include "dashboard.fullname" $ }}-sgpf-small
  postgres:
    version:  {{ .Values.pgVersion | quote }}
    extensions:
    - name: postgis
    - name: timescaledb
    - name: 'pg_repack'
    - name: 'pg_trgm'
  pods:
    persistentVolume: 
      size: '5Gi'
    scheduling:
      tolerations:
        - key: "stackgres"
          operator: "Exists"
          effect: "NoSchedule"
  {{- if .Values.cluster.managedSql.enabled }}
  managedSql:
    scripts:
    - sgScript: {{ include "dashboard.fullname" $ }}-scripts
  {{- end }}
  configurations:
    sgPostgresConfig: {{ include "dashboard.fullname" $ }}-sgcf-small
    {{- with .Values.cluster.configurations.patroni }}
    patroni:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if .Values.credentials }}
    credentials:
      {{- with .Values.credentials.patroni }}
      patroni:
        {{- with .restApiPassword }}
        restApiPassword:
          name: {{ include "dashboard.fullname" $ }}-users
          key: restapi-password
        {{- end }}
      {{- end }}
      {{- with .Values.credentials.users }}
      users:
        {{- with .superuser }}
        superuser:
          {{- with .username }}
          username:
            name: {{ include "dashboard.fullname" $ }}-users
            key: superuser-username
          {{- end }}
          {{- with .password }}
          password:
            name: {{ include "dashboard.fullname" $ }}-users
            key: superuser-password
          {{- end }}
        {{- end }}
        {{- with .replication }}
        replication:
          {{- with .username }}
          username:
            name: {{ include "dashboard.fullname" $ }}-users
            key: replication-username
          {{- end }}
          {{- with .password }}
          password:
            name: {{ include "dashboard.fullname" $ }}-users
            key: replication-password
          {{- end }}
        {{- end }}
        {{- with .authenticator }}
        authenticator:
          {{- with .username }}
          username:
            name: {{ include "dashboard.fullname" $ }}-users
            key: authenticator-username
          {{- end }}
          {{- with .password }}
          password:
            name: {{ include "dashboard.fullname" $ }}-users
            key: authenticator-password
          {{- end }}
        {{- end }}
      {{- end }}
    {{- else }}
    {{- with .Values.cluster.configurations.credentials }}
    credentials:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
  postgresServices:
    primary:
      type: ClusterIP
    replicas:
      type: ClusterIP

{{- end }}

---

{{- if .Values.stackgresOperator.enabled }}
apiVersion: stackgres.io/v1
kind: SGInstanceProfile
metadata:
  name: {{ include "dashboard.fullname" . }}-sgpf-small
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  cpu: "1"
  memory: "2Gi"
{{- end }}

---

{{- if .Values.stackgresOperator.enabled }}
apiVersion: stackgres.io/v1
kind: SGPostgresConfig
metadata:
  name: {{ include "dashboard.fullname" . }}-sgcf-small
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  postgresVersion: {{ .Values.pgVersion | quote }}
{{- end }}

---

{{- if .Values.stackgresOperator.enabled }}
apiVersion: stackgres.io/v1
kind: SGDbOps
metadata:
  name: {{ include "dashboard.fullname" . }}-minor-upgrade
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
spec:
  op: minorVersionUpgrade
  sgCluster: {{ include "dashboard.fullname" . }}-stackgres-simple

  minorVersionUpgrade:
    postgresVersion: {{ .Values.pgMinorVersion | quote }}
{{- end }}

---

{{- if .Values.stackgresOperator.enabled }}
apiVersion: stackgres.io/v1
kind: SGDbOps
metadata:
  name: {{ include "dashboard.fullname" . }}-sec-upgrade
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
spec:
  sgCluster: {{ include "dashboard.fullname" . }}-stackgres-simple
  op: securityUpgrade
  securityUpgrade:
    method: InPlace
{{- end }}