{{- if and .Values.stackgresOperator.enabled .Values.cluster.securityUpgrade.enabled}}
apiVersion: stackgres.io/v1
kind: SGDbOps
metadata:
  name: {{ include "dashboard.fullname" . }}-sec-upgrade
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
spec:
  sgCluster: {{ include "dashboard.fullname" . }}-stackgres-simple
  op: securityUpgrade
  securityUpgrade:
    method: InPlace
{{- end }}