{{- if .Values.cluster.managedSql.enabled }}
apiVersion: stackgres.io/v1
kind: SGScript
metadata:
  name: {{ include "dashboard.fullname" $ }}-scripts
  labels:
    {{- include "dashboard.labels" $ | nindent 4 }}
spec:
  {{- if .Values.cluster.managedSql.continueOnError }}
  continueOnError: {{ .Values.cluster.managedSql.continueOnError }}
  {{- end }}
  scripts:
  - name: create-superset-database
    script: |
      CREATE USER {{ dig "superset" "supersetNode" "connections" "db_user" .Values | default "superset" }} 
      WITH PASSWORD '{{ dig "superset" "supersetNode" "connections" "db_pass" .Values | default "superset" }}';
      
      CREATE DATABASE {{ dig "superset" "supersetNode" "connections" "db_name" .Values | default "superset" }} 
      WITH OWNER {{ dig "superset" "supersetNode" "connections" "db_user" .Values | default "superset" }} 
      encoding 'utf8';
  {{- if .Values.cluster.managedSql.scripts }}
  {{- toYaml .Values.cluster.managedSql.scripts | nindent 2 }}
  {{- end }}
{{- end }}