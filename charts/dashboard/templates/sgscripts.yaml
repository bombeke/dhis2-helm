{{- if .Values.cluster.managedSql.enabled }}
apiVersion: stackgres.io/v1
kind: SGScript
metadata:
  name: {{ include "dashboard.fullname" $ }}-scripts
  labels:
    {{- include "dashboard.labels" $ | nindent 4 }}
  {{- if and .Values.cluster.create }}
  annotations:
    helm.sh/hook: "pre-install"
  {{- end }}
spec:
  {{- if .Values.cluster.managedSql.continueOnError }}
  continueOnError: {{ .Values.cluster.managedSql.continueOnError }}
  {{- end }}
  scripts:
  - name: create-superset-database
    script: |
      CREATE USER {{ .Values.superset.supersetNode.connections.db_user | default "superset" }} WITH PASSWORD '{{ .Values.superset.supersetNode.connections.db_pass | default "superset" }}';
      CREATE DATABASE {{ .Values.superset.supersetNode.connections.db_name | default "superset" }} WITH OWNER {{ .Values.superset.supersetNode.connections.db_user | default "superset" }} encoding 'utf8';
  {{- if .Values.cluster.managedSql.scripts }}
  {{- toYaml .Values.cluster.managedSql.scripts | nindent 2 }}
  {{- end }}
{{- end }}